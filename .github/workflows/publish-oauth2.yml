name: Publish OAuth2

on:
  push:
    tags:
      - 'oauth2/v*.*.*'

jobs:
  publish:
    name: Build & Publish OAuth2 Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Metadata (OAuth2)
        id: meta-oauth2
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/oauth2-middleware
          tags: |
            type=match,pattern=oauth2/v(.*),group=1
            type=raw,value=latest

      - name: Build and Push OAuth2
        uses: docker/build-push-action@v5
        with:
          context: ./oauth2
          file: ./oauth2/docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta-oauth2.outputs.tags }}
          labels: ${{ steps.meta-oauth2.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
